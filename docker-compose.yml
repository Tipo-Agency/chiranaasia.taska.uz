version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taska
      POSTGRES_PASSWORD: ${DB_PASSWORD:-taska}
      POSTGRES_DB: taska
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # хост 5433 — если на сервере уже занят 5432 (локальный Postgres)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taska -d taska"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./apps/api
    ports:
      - "8003:8000"   # хост 8003 (из списка свободных портов проекта)
    environment:
      DATABASE_URL: postgresql+asyncpg://taska:${DB_PASSWORD:-taska}@db:5432/taska
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
    depends_on:
      db:
        condition: service_healthy

  # DB UI (dev tools): запускается только с профилем "tools"
  # docker-compose --profile tools up -d
  adminer:
    image: adminer:4
    profiles: ["tools"]
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db

  pgadmin:
    image: dpage/pgadmin4:8
    profiles: ["tools"]
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - db

  # telegram-bot: раскомментируйте и задайте TELEGRAM_BOT_TOKEN для запуска бота
  # telegram-bot:
  #   build: ./apps/bot
  #   environment:
  #     TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
  #     BACKEND_URL: http://backend:8000
  #   depends_on:
  #     - backend

volumes:
  pgdata:
  pgadmin-data:
