# Вызывается из ci.yml (`workflow_call`). Отдельный job-файл для фронта (сборка/lint/typecheck).
name: Web CI

on:
  workflow_call:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: npm audit
        run: npm audit --workspace apps/web --audit-level=high
        continue-on-error: true
      - run: npm --workspace apps/web run lint
      - run: npm --workspace apps/web run typecheck
      - run: npm --workspace apps/web run build
