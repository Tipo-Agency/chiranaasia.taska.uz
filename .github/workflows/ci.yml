name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff check
        run: ruff check app
      # Smoke-тесты pytest требуют поднятый API + БД; гоняются локально / на сервере.

  deploy:
    needs: [web, api]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            export SERVER_PATH="${{ secrets.SERVER_PATH }}"
            export TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
            # Секрет «Подтверждение маркера»: в GitHub — Meta_marker (приоритет) или META_MARKER
            export META_MARKER="${{ secrets.Meta_marker }}"
            if [ -z "$META_MARKER" ]; then export META_MARKER="${{ secrets.META_MARKER }}"; fi
            export META_TASKA="${{ secrets.META_TASKA }}"
            export META_TIPA="${{ secrets.META_TIPA }}"
            export META_UCHETGRAM="${{ secrets.META_UCHETGRAM }}"
            export BACKEND_URL="${{ secrets.BACKEND_URL }}"
            export NGINX_SITE_NAME="${{ secrets.NGINX_SITE_NAME }}"
            cd "$SERVER_PATH"
            chmod +x ops/scripts/deploy.sh
            ./ops/scripts/deploy.sh
