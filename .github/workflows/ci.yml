name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    uses: ./.github/workflows/ci-web.yml

  api:
    uses: ./.github/workflows/ci-api.yml
    # Интеграционные тесты (`-m integration`) — против поднятого API + Postgres, см. docs/TESTING.md.

  deploy:
    needs: [web, api]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      # Секреты не наследуются между репозиториями GitHub: у tipa / chiranaasia / unique — свои Actions Secrets.
      - name: Проверка секретов деплоя
        run: |
          set -e
          err() { echo "::error::$1"; exit 1; }
          [ -n "${{ secrets.SERVER_HOST }}" ] || err "Задайте SERVER_HOST (Settings → Secrets → Actions). Без него ssh-action: missing server host."
          [ -n "${{ secrets.SERVER_USER }}" ] || err "Задайте SERVER_USER."
          [ -n "${{ secrets.SERVER_SSH_KEY }}" ] || err "Задайте SERVER_SSH_KEY."
          [ -n "${{ secrets.SERVER_PATH }}" ] || err "Задайте SERVER_PATH — абсолютный путь к клону ЭТОГО репо на сервере (напр. /var/www/chiranaasia.taska.uz). У каждого репозитория свой путь."
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # GitHub Secrets часто дают перевод строки или CRLF в конце — без trim путь «не существует»
            _sp_raw="${{ secrets.SERVER_PATH }}"
            SERVER_PATH="$(printf '%s' "$_sp_raw" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            export SERVER_PATH
            export TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
            # Секрет «Подтверждение маркера»: в GitHub — Meta_marker (приоритет) или META_MARKER
            export META_MARKER="${{ secrets.Meta_marker }}"
            if [ -z "$META_MARKER" ]; then export META_MARKER="${{ secrets.META_MARKER }}"; fi
            export META_TASKA="${{ secrets.META_TASKA }}"
            export META_TIPA="${{ secrets.META_TIPA }}"
            export META_UCHETGRAM="${{ secrets.META_UCHETGRAM }}"
            export SECRET_KEY="${{ secrets.SECRET_KEY }}"
            if [ -z "$SECRET_KEY" ]; then export SECRET_KEY="${{ secrets.API_SECRET_KEY }}"; fi
            export BACKEND_URL="${{ secrets.BACKEND_URL }}"
            export NGINX_SITE_NAME="${{ secrets.NGINX_SITE_NAME }}"
            # MTProto (личный Telegram в CRM): my.telegram.org → api_id / api_hash
            export TELEGRAM_API_ID="${{ secrets.TELEGRAM_API_ID }}"
            export TELEGRAM_API_HASH="${{ secrets.TELEGRAM_API_HASH }}"
            if [ -z "$SERVER_PATH" ]; then echo "❌ SERVER_PATH пуст после нормализации"; exit 1; fi
            if [ ! -d "$SERVER_PATH" ]; then
              echo "❌ SERVER_PATH не каталог или нет прав зайти в путь (длина после trim: ${#SERVER_PATH})"
              _pdir="$(dirname "$SERVER_PATH")"
              echo "   Родитель (ls -la, до 25 строк):"
              ls -la "$_pdir" 2>&1 | head -25 || true
              if [ -L "$SERVER_PATH" ]; then echo "   Это symlink, readlink: $(readlink "$SERVER_PATH" 2>&1)"; fi
              echo "   На сервере под этим SSH-пользователем: whoami=$(whoami) pwd=$(pwd)"
              echo "   Проверьте: клон реально на ЭТОМ хосте (SERVER_HOST), путь без лишнего переноса в Secret, права на каталог (chmod o+x /var/www при необходимости)."
              exit 1
            fi
            cd "$SERVER_PATH" || { echo "❌ cd SERVER_PATH failed"; exit 1; }
            git config --global --add safe.directory "$SERVER_PATH" 2>/dev/null || true
            # Пока на сервере старый deploy.sh без stash: незакоммиченные правки в ops/nginx/nginx.conf ломают merge.
            # Ниже — checkout deploy.sh с origin/main, затем stash внутри самого deploy.sh при необходимости.
            git fetch origin || { echo "❌ git fetch failed"; exit 1; }
            git update-index -q --refresh 2>/dev/null || true
            if ! git diff --quiet HEAD 2>/dev/null; then
              echo "📦 CI: stash локальных правок перед deploy (часто ops/nginx/nginx.conf)..."
              git stash push -m "ci: autostash before deploy $(date -Is)" || { echo "❌ git stash failed"; exit 1; }
            fi
            # fetch не трогает рабочее дерево: без этого при расхождении main и origin/main
            # на диске остаётся СТАРЫЙ deploy.sh — merge внутри скрипта падает, а fallback ещё не в файле.
            git checkout origin/main -- ops/scripts/deploy.sh || { echo "❌ не удалось взять ops/scripts/deploy.sh с origin/main"; exit 1; }
            chmod +x ops/scripts/deploy.sh
            ./ops/scripts/deploy.sh
