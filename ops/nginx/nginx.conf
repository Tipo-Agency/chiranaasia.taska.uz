# Nginx config for production (reverse proxy)
# Frontend static files + API proxy to Python backend
# Backend: Docker (container 8000 → host 8001) — nginx проксирует на 127.0.0.1:8001

server {
    listen 80;
    server_name _;

    # Сборка фронта из репо: SERVER_PATH/apps/web/dist (деплой копирует сюда или в /var/www/frontend)
    root /var/www/frontend;
    index index.html;

    # Frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to FastAPI backend (Docker на порту 8001; если 8000 свободен — поменяйте обратно)
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:8001;
    }
}
