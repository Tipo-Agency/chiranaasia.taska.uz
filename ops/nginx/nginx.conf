# Nginx: chiranaasia.taska.uz — статика (Vite/React билд) + прокси API на бэкенд
# Фронт: apps/web. Деплой копирует dist/ в /var/www/frontend. Бэкенд: Docker на 8003.
# SSL: Certbot. Один раз на сервере: sudo certbot --nginx -d chiranaasia.taska.uz

# HTTP → редирект на HTTPS (раскомментируйте, когда SSL уже выдан)
# server {
#     listen 80;
#     server_name chiranaasia.taska.uz;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    server_name chiranaasia.taska.uz;
    # По умолчанию nginx не передаёт клиентские заголовки с «_» в имени. Telegram шлёт
    # X-Telegram-Bot-Api-Secret-Token на вебхук — без этого заголовка API отвечает 403 → бот «мёртвый».
    underscores_in_headers on;
    # API: MAX_REQUEST_BODY_BYTES / WEBHOOK_MAX_BODY_BYTES — до ~10 MB; запас для multipart
    client_max_body_size 12m;

    root /var/www/frontend;
    index index.html;

    # SPA shell: не кэшировать долго — иначе после деплоя старый index тянет старые имена чанков → 404 на /assets/*.js.
    # expires epoch задаёт Cache-Control: no-cache без add_header в этом location (иначе потеряли бы add_header с верхнего уровня).
    location = /index.html {
        expires epoch;
    }

    # Чанки Vite: только реальные файлы. Иначе try_files из location / отдаёт index.html →
    # «MIME type text/html» для .js/.css и падение динамических импортов при частичном деплое.
    location ^~ /assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Корневые *.css/*.js и т.п.: не подменять index.html (устаревший /index.css, сторонние чанки).
    location ~ ^/[^/]+\.(css|js|mjs|map|json|ico|woff2?|ttf|eot|svg|png|jpe?g|webp|gif|webmanifest)$ {
        try_files $uri =404;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket: in-app уведомления (FastAPI /api/notifications/ws/{user_id}).
    # Если в браузере «WebSocket connection failed»: проверьте, что этот блок есть и в HTTPS-server {},
    # и что перед nginx (Cloudflare и т.п.) включены WebSockets / не режется Upgrade.
    location /api/notifications/ws/ {
        proxy_pass http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:8003;
    }

    # Prometheus GET /metrics — только доверенные сети (Bearer: см. PROMETHEUS_SCRAPE_TOKEN в API)
    location = /metrics {
        allow 127.0.0.1;
        allow ::1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Meta Messenger / Instagram Webhooks (Callback URL в кабинете разработчика)
    location /webhook/ {
        proxy_pass http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS — запросы к chiranaasia.taska.uz по 443 попадают сюда, а не в другие server_name
server {
    listen 443 ssl;
    server_name chiranaasia.taska.uz;
    underscores_in_headers on;
    client_max_body_size 12m;

    ssl_certificate     /etc/letsencrypt/live/chiranaasia.taska.uz/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/chiranaasia.taska.uz/privkey.pem;
    include              /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam          /etc/letsencrypt/ssl-dhparams.pem;

    # WebSocket уведомлений: при ошибке подключения в браузере сверьте этот location и прокси Upgrade (см. server :80).

    # Безопасность ответов (дублирует часть заголовков с FastAPI — нормально для статики и прокси)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # script-src: legacy-билды с tailwind CDN / esm.sh; unsafe-inline — старые index.html с inline.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.tailwindcss.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.facebook.com https://graph.facebook.com https://*.fbcdn.net https://*.instagram.com https://telegram.org https://*.telegram.org https://esm.sh wss: ws:; worker-src 'self' blob:; form-action 'self'; upgrade-insecure-requests" always;

    root /var/www/frontend;
    index index.html;

    location = /index.html {
        expires epoch;
    }

    location ^~ /assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~ ^/[^/]+\.(css|js|mjs|map|json|ico|woff2?|ttf|eot|svg|png|jpe?g|webp|gif|webmanifest)$ {
        try_files $uri =404;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/notifications/ws/ {
        proxy_pass http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:8003;
    }

    location = /metrics {
        allow 127.0.0.1;
        allow ::1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /webhook/ {
        proxy_pass http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

